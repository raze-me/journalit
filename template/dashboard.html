<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Jourmal iT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}" />
    <link rel="icon" href="{{ url_for('static', filename='assets/logo.png') }}" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>

    <div class="dashboard-layout">
        <header class="dashboard-header">
            <div class="logo font-serif" style="display: flex; align-itmes: center; gap: 8px;">
                <img src="{{ url_for('static', filename='assets/logo.png') }}" alt="Journal iT Logo" style="height: 32px; width: 32px; object-fit: contain;">
                Journal iT
            </div>
            <div class="user-controls">
                <span c;ass="user-info" id="user-welcome">Loading...</span>
                <button class="btn btn-outline" id="btn-sign-out" type="button">Sign Out</button>
                </div>
        </header>
        <main class="dashboard-main">
            <div class="calendar-header">
                <button class="nav-btn" id="prev-month" aria-label="Previous Month">
                    <span class="material-symbols-outlined">chevron_left</span>
                </button>
                <h2 class="current-month font-serif" id="month-display">Month Year</h2>
                <button class="nav-btn" id="next-month" aria-label="Next Month">
                    <span class="material-symbols-outlined">chevron_right</span>
                </button>
            </div>

            <div class="calendar-container">
                <div class="weedays-grid">
                    <div>Sun</div>
                    <div>Mon</div>
                    <div>Tue</div>
                    <div>Wed</div>
                    <div>Thu</div>
                    <div>Fri</div>
                    <div>Sat</div>
                </div>
                <div class="dates-grid" id="calendar-grid">

                </div>
            </div>

        </main>
    </div>
    <div class="dialog-overlay" id="entry-dialog" aria-hidden="true">
        <div class="dialog-card">
            <div class="dialog-header">
                <h3 class="dialog-title font-serif" if="dialog-date">Date</h3>
                <button class="btn-icon" id="btn-close-dialog" aria-label="Close dialog">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="dialog-body">
                <textarea class="journal-textarea font-serif" id="journal-input" placeholder="Start writing your thoughts here..."></textarea>
            </div>
            <div class="dialog-footer">
                <button class="btn btn-outline" id="btn-cancel-entry">Cancel</button>
                <button class="btn-save-entry">Save Entry</button>
            </div>
        </div>
        </div>
        <script type="module" src="{{ url_for('static', filename='js/dashborad.js')}}"></script>
</body>
</html>
